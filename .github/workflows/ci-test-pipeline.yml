name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: 'true'
  # Use repository secrets in CI; fallback placeholders are safe defaults for local runs
  PTERODACTYL_API_URL: 'https://example-pterodactyl.com'
  PTERODACTYL_API_TOKEN: 'test-token-12345'
  PTERODACTYL_SERVER_ID: 'test-server-uuid-12345'
  DISCORD_WEBHOOK_URL: 'https://discord.com/api/webhooks/test/test'

jobs:
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install minimal tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint critical errors
        run: |
          # Fail on syntax errors and undefined names
          flake8 windrose_monitor.py test_windrose_monitor.py --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Python syntax
        run: |
          python -m py_compile windrose_monitor.py || (echo "Syntax error in monitor" && exit 1)
          python -m py_compile test_windrose_monitor.py || (echo "Syntax error in tests" && exit 1)
          echo "✓ Syntax OK"

  test:
    name: Run Tests Matrix
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with pytest and coverage
        run: |
          mkdir -p reports
          pytest -q --maxfail=1 --junitxml=reports/junit-${{ matrix.python-version }}.xml --cov=. --cov-report=xml:reports/coverage-${{ matrix.python-version }}.xml --ignore=test_manual.py
        env:
          # Ensure tests run in CI mode and use mocked APIs
          CI: 'true'
          PTERODACTYL_API_URL: ${{ env.PTERODACTYL_API_URL }}
          PTERODACTYL_API_TOKEN: ${{ env.PTERODACTYL_API_TOKEN }}
          PTERODACTYL_SERVER_ID: ${{ env.PTERODACTYL_SERVER_ID }}
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_WEBHOOK_URL }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.python-version }}
          path: reports/

      - name: Validate config.example.json
        run: |
          python -m json.tool config.example.json > /dev/null
          echo "✓ config.example.json is valid JSON"

      - name: Validate .env.example format
        run: |
          grep -E '^[A-Z_]+=' .env.example || true
          echo "✓ .env.example format is valid"

  lint:
    name: Full Lint
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          # Report style issues but do not fail the build
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
