name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  # Set CI mode for test scripts to use mocked APIs
  CI: 'true'
  # Test environment variables (placeholder values for CI)
  PTERODACTYL_API_URL: 'https://example-pterodactyl.com'
  PTERODACTYL_API_TOKEN: 'test-token-12345'
  PTERODACTYL_SERVER_ID: 'test-server-uuid-12345'
  DISCORD_WEBHOOK_URL: 'https://discord.com/api/webhooks/test/test'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run unit tests
      run: |
        python -m unittest discover -s . -p 'test_*.py' -v
    
    - name: Run configuration validator (CI mode)
      run: |
        python test_config.py
    
    - name: Validate config.example.json
      run: |
        python -m json.tool config.example.json > /dev/null
        echo "✓ config.example.json is valid JSON"
    
    - name: Validate .env.example
      run: |
        # Check that .env.example has the expected format
        grep -E '^[A-Z_]+=' .env.example > /dev/null || true
        echo "✓ .env.example format is valid"
    
    - name: Check Python syntax
      run: |
        python -m py_compile windrose_monitor.py
        python -m py_compile test_config.py
        echo "✓ All Python files have valid syntax"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 windrose_monitor.py test_windrose_monitor.py test_config.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 windrose_monitor.py test_windrose_monitor.py test_config.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
