name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.7', '3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run unit tests
      run: |
        python -m unittest discover -s . -p 'test_*.py' -v
    
    - name: Validate config.example.json
      run: |
        python -m json.tool config.example.json > /dev/null
        echo "✓ config.example.json is valid JSON"
    
    - name: Check Python syntax
      run: |
        python -m py_compile windrose_monitor.py
        python -m py_compile test_config.py
        echo "✓ All Python files have valid syntax"
    
    - name: Run config validation tests
      run: |
        python test_config.py --help 2>/dev/null || echo "✓ test_config.py loads successfully"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 windrose_monitor.py test_windrose_monitor.py test_config.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 windrose_monitor.py test_windrose_monitor.py test_config.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
