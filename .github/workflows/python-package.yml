# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Set CI mode for test scripts to use mocked APIs
  CI: 'true'
  # Test environment variables (placeholder values for CI)
  PTERODACTYL_API_URL: 'https://example-pterodactyl.com'
  PTERODACTYL_API_TOKEN: 'test-token-12345'
  PTERODACTYL_SERVER_ID: 'test-server-uuid-12345'
  DISCORD_WEBHOOK_URL: 'https://discord.com/api/webhooks/test/test'

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run unit tests
      run: |
        python -m unittest discover -s . -p 'test_*.py' -v
    - name: Test configuration (CI mode)
      run: |
        python test_config.py

